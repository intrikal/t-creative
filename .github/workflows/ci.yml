name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HUSKY: 0

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & Type Check (~30s, runs in parallel with Unit Tests)
  # ─────────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Migration Integration Tests (depends on Lint & Type Check)
  # Spins up a Postgres 15 container via testcontainers and verifies that all
  # migrations apply cleanly, tables/indexes/constraints exist, the seed script
  # runs without error, and migrations are idempotent.
  # ─────────────────────────────────────────────────────────────────────────────
  migration-tests:
    name: Migration Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migration integration tests
        run: npx vitest run tests/migrations.test.ts --reporter=verbose
        env:
          # Testcontainers manages its own Docker container — no external DB needed.
          # These placeholders satisfy lib/env.ts Zod validation at import time.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DATABASE_POOLER_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_POSTHOG_KEY: phc_placeholder
          NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
          RESEND_API_KEY: re_placeholder

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Unit Tests (depends on Migration Integration Tests)
  # Requires @vitest/coverage-v8 for coverage: npm install -D @vitest/coverage-v8
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [migration-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Post coverage summary on PR
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build (depends on both Lint and Unit Tests passing)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, migration-tests, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build artifacts
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Create build environment
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/db
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder_anon_key
          NEXT_PUBLIC_SITE_URL=http://localhost:3000
          NEXT_PUBLIC_POSTHOG_KEY=phc_placeholder
          NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com
          EOF

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: E2E Tests (depends on Build passing)
  # Note: playwright.config.ts uses `npm run dev` as the webServer command.
  # The app is pre-built here so dev mode starts faster using existing .next cache.
  # To test against the production build, update playwright.config.ts to use
  # `command: process.env.CI ? "npm start" : "npm run dev"`.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Create build environment
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/db
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder_anon_key
          NEXT_PUBLIC_SITE_URL=http://localhost:3000
          NEXT_PUBLIC_POSTHOG_KEY=phc_placeholder
          NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com
          EOF

      - name: Build app
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Lighthouse Audit (depends on Build passing)
  # ─────────────────────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Create build environment
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/db
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder_anon_key_for_lighthouse_ci
          NEXT_PUBLIC_SITE_URL=http://localhost:3000
          NEXT_PUBLIC_POSTHOG_KEY=phc_placeholder
          NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com
          EOF

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true

      - name: Post Lighthouse scores as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = ${{ steps.lighthouse.outputs.manifest }};
            if (!results || results.length === 0) return;

            const rows = results.map(({ url, summary }) => {
              const score = (key) => summary[key] != null ? `${Math.round(summary[key] * 100)}` : 'N/A';
              const icon  = (key, threshold) => {
                const v = summary[key];
                return v == null ? '—' : v >= threshold ? '✅' : '❌';
              };
              return [
                `| \`${url}\``,
                `${icon('performance', 0.9)} ${score('performance')}`,
                `${icon('accessibility', 0.95)} ${score('accessibility')}`,
                `${icon('best-practices', 0.95)} ${score('best-practices')}`,
                `${icon('seo', 0.95)} ${score('seo')} |`,
              ].join(' | ');
            }).join('\n');

            const body = [
              '## Lighthouse CI Results',
              '',
              '| URL | Perf ≥90 | A11y ≥95 | Best ≥95 | SEO ≥95 |',
              '|-----|----------|----------|----------|---------|',
              rows,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 7: Database Migration Check (runs in parallel with other jobs)
  # Validates all migrations apply cleanly to a fresh Postgres 15 database.
  # ─────────────────────────────────────────────────────────────────────────────
  db-migration-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: t_creative_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        env:
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/t_creative_ci
        run: npx drizzle-kit migrate
